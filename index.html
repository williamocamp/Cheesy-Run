<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cheesy Run</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧀</text></svg>" />
  <style>
    :root { --warm: #2b2430; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 50% 25%, #1a0b2e, #070311 75%);
      font-family: -apple-system, "Segoe UI", Arial, sans-serif;
      color: #e9d6ff;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #game {
      width: min(96vw, 96vh * 1.538);
      aspect-ratio: 880 / 572;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(255,43,214,0.25), 0 0 30px rgba(0,229,255,0.2), inset 0 0 0 2px rgba(0,229,255,0.12);
    }
    #game canvas { display: block; border-radius: 16px; }
    .hint {
      font-size: 14px;
      opacity: 0.75;
      letter-spacing: 0.3px;
    }
    .hint b { color: #ffd98a; }
  </style>
</head>
<body>
  <div id="app">
    <div id="game"></div>
    <div class="hint">
      Move with <b>WASD</b> / <b>Arrow keys</b> &nbsp;•&nbsp; Grab all the cheese &nbsp;•&nbsp; Dodge the humans' red vision &amp; the traps
    </div>
  </div>

  <!-- Phaser 3 from CDN keeps this a zero-build static site -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
